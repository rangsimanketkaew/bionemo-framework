defaults:
  - defaults
  - _self_

# Training config
model_preset: encodon_5b
num_train_steps: 500_000

use_sequence_packing: true
dataset:
  data_path: ???
  micro_batch_size: 4
  num_workers: 1
  max_seq_length: 512

# WandB config
wandb_init_args:
  name: "codonfm_native_te_5b"

# Learning rate scheduler config
lr_scheduler_kwargs:
  num_warmup_steps: 2_000
  num_training_steps: 500_000

checkpoint:
  ckpt_dir: ???
  resume_from_checkpoint: true
  save_every_n_steps: 1_000

logger:
  frequency: 100
