[build-system]
# Learning: Pin setuptools < 80.0.0. Newer versions break some CUDA extension builds
# by removing legacy distutils functionality.
requires = ["setuptools>=64,<80.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bionemo-eden"
readme = "README.md"
description = "Library containing data preprocessing, training, and inference tooling for Eden (Llama-based genomic models)."
authors = [{ name = "BioNeMo Team", email = "bionemofeedback@nvidia.com" }]
requires-python = ">=3.10"
license = { file = "LICENSE" }
dynamic = ["version"]
dependencies = [
    "nvidia-modelopt[torch]>=0.37.0",
    # quack-kernels imports cutlass.cute.core.ThrMma, which is absent from
    # nvidia-cutlass-dsl 4.6.0.dev0. Keep the resolver on the compatible 4.5.x API.
    "nvidia-cutlass-dsl>=4.5.2,<4.6.0.dev0",

    # These sources are defined in [tool.uv.sources] below
    "megatron-bridge",
    "megatron-core",
    "nvidia-resiliency-ext",
    "emerging_optimizers",

    # bionemo.common dependencies
    "boto3",
    "nest_asyncio",
    "ngcsdk",
    "platformdirs",
    "polars",
    "pooch",
    "pydantic[email]",
    "pyyaml",
    "tqdm",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[project.scripts]
torchrun = "torch.distributed.run:main"
infer_eden = "bionemo.eden.run.infer:main"
train_eden = "bionemo.eden.run.train:main"
predict_eden = "bionemo.eden.run.predict:main"
eden_convert_nemo2_to_mbridge = "bionemo.eden.utils.checkpoint.nemo2_to_mbridge:main"
eden_export_mbridge_to_hf = "bionemo.eden.utils.checkpoint.eden_mbridge_hf:main_export"
eden_convert_hf_to_mbridge = "bionemo.eden.utils.checkpoint.eden_mbridge_hf:main_import"
download_bionemo_data = "bionemo.common.data.load:entrypoint"
bionemo_fasta_to_jsonl = "bionemo.common.io.fasta_to_jsonl:main"
bionemo_precompute_windows = "bionemo.common.data.basecamp.sharded_dataset:main_precompute"
bionemo_remove_optimizer = "bionemo.common.checkpoint.remove_optimizer:main"
eden_remove_optimizer = "bionemo.eden.utils.checkpoint.eden_remove_optimizer:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["bionemo.*"]
namespaces = true
exclude = ["test*."]

[tool.setuptools.dynamic]
version = { file = "VERSION" }

[tool.setuptools.package-data]
"bionemo.common.data" = ["resources/*.yaml"]

# ------------------------------------------------------------------
# UV Configuration
# ------------------------------------------------------------------

[tool.uv]
cache-keys = [{ git = true }]
prerelease = "allow"

# Learning: This list matches the official Megatron-Bridge config.
# These packages must be built against the SYSTEM PyTorch (no isolation).
no-build-isolation-package = [
    "flash_mla",
    "flash-linear-attention",
    "mamba-ssm",
    "transformer-engine",
    "transformer-engine-torch",
]

# Learning: The 'sys_platform == "never"' hack is the correct way
# to force uv to accept the container's pre-installed versions.
override-dependencies = [
    "nvidia-modelopt[torch]>=0.37.0",
    "torch; sys_platform == 'never'",
    "torchvision; sys_platform == 'never'",
    "triton; sys_platform == 'never'",
    "transformer-engine; sys_platform == 'never'",
    "transformer-engine[pytorch]; sys_platform == 'never'",
]

[tool.uv.sources]
nvidia-resiliency-ext = { git = "https://github.com/NVIDIA/nvidia-resiliency-ext.git", rev = "54f85fe422d296cf04ea524130014bd3a2c3add1" }

# Megatron Bundle. This points to a version that still supports the deprecated no_weight_decay_cond field until the API for an alternative has been finalized.
megatron-bridge = { git = "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git", rev = "549e3cb970c170b1d7a86d021261efe05e8a5d9f" }
megatron-core = { git = "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git", rev = "549e3cb970c170b1d7a86d021261efe05e8a5d9f", subdirectory = "3rdparty/Megatron-LM" }

[tool.uv.extra-build-dependencies]
warp-lang = ["wheel_stub"]
