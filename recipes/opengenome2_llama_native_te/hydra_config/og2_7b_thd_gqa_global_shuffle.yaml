# OpenGenome2 7B - Pre-chunked globally shuffled parquet shards
#
# Uses pre-windowed parquet shards from /data/opengenome2/parquet_split/
# Each shard row is exactly 8190 bases -> tokenized to 8192 tokens (BOS + 8190 + EOS).
# Standard windowed tokenization with stride=200; since each sequence is exactly
# one window long, stride has no effect.
#
# THD format + BF16 + FP32 master weights (no FP8).
# GBS = micro_batch_size * grad_acc_steps * num_gpus = 1 * 8 * num_gpus

defaults:
  - og2_7b_thd_gqa
  - _self_

# FP32 master weights
use_fp32_master_weights: true
use_meta_device: false

# No FP8
fp8_config:
  enabled: false
  fp8_recipe: transformer_engine.common.recipe.DelayedScaling
  fp8_format: "HYBRID"
  fp8_recipe_kwargs: {}
  quantized_model_init_kwargs:
    enabled: false

# Dataset: pre-chunked globally shuffled shards
dataset:
  tokenizer_name_or_path: ./tokenizers/nucleotide_fast_tokenizer
  micro_batch_size: 1
  num_workers: 8
  max_seq_length: 8192
  stride: 200
  buffer_size: 10_000
  mask_degenerate_bases: true
  uppercase_labels: false
  load_dataset_kwargs:
    path: "/data/opengenome2/parquet_split"
    split: "train"
    streaming: true

grad_acc_steps: 8

validation:
  enabled: false

logger:
  frequency: 10

wandb:
  name: og2_7b_global_shuffle
  project: opengenome2-7b
