defaults:
  - defaults
  - _self_

# Use tiny Llama config for fast convergence testing
config_name_or_path: ./model_configs/meta-llama/Llama-3.2-1B
config_kwargs:
  num_hidden_layers: 2
  hidden_size: 384
  intermediate_size: 1536
  num_attention_heads: 6
  num_key_value_heads: 6
  attn_input_format: "bshd"

num_train_steps: 250

# Enable for CI/CD validation
use_torch_compile: true
use_meta_device: false  # meta-device init breaks weight initialization; see defaults.yaml

# OG2 defaults: disable expensive features for sanity testing
spike_no_more_embedding_init: false
use_megatron_scaled_init: false
use_fp32_master_weights: false

dataset:
  tokenizer_name_or_path: ./tokenizers/nucleotide_fast_tokenizer
  micro_batch_size: 1
  max_seq_length: 256
  text_column: "sequence"
  mask_degenerate_bases: false
  load_dataset_kwargs:
    path: "parquet"
    split: "train"
    data_files: "test_genomic_sequences.parquet"
    streaming: True

wandb:
  name: "og2_sanity"
  mode: "offline"

lr_scheduler_kwargs:
  num_warmup_steps: 10

checkpoint:
  ckpt_dir: null
  save_final_model: false

logger:
  frequency: 1
