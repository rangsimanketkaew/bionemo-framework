version: 2

updates:
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    reviewers:
      - "pstjohn"
      - "jstjohn"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    reviewers:
      - "pstjohn"
      - "dorotat-nv"
      - "trvachov"

  - package-ecosystem: "uv"
    directories:
      - "/models/**"
      - "/recipes/**"
      - "/interpretability/**"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns: ["*"]
    reviewers:
      - "pstjohn"

  - package-ecosystem: "pip"
    directories:
      - "/models/**"
      - "/recipes/**"
      - "/interpretability/**"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns: ["*"]
    reviewers:
      - "pstjohn"

  - package-ecosystem: "npm"
    directories:
      - "/models/**"
      - "/recipes/**"
      - "/interpretability/**"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns: ["*"]
    reviewers:
      - "pstjohn"
