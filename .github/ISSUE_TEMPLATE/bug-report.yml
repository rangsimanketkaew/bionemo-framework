name: Bug Report
description: Create a detailed bug report to help us resolve the issue
title: "[BUG] <Title> "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please provide as much detail as possible to help us investigate.

  - type: input
    id: version
    attributes:
      label: BioNeMo Recipes Version
      description: |
        **What version or commit hash of the framework are you using?**

        Please specify a **commit hash** or **version tag**.
        ⚠️ **Do not use** `latest`, `ToT`, or `nightly` as a reference.

        **How to find the commit hash or version tag:**
        - **Local repository commit hash:**
          ```bash
          git rev-parse HEAD
          ```
        - **Remote main branch commit hash:**
          ```bash
          git rev-parse origin/main
          ```
        - **Commit hash from a Docker image (replace `<tag>` with the version you use):**
          ```bash
          docker image inspect nvcr.io/nvidia/clara/bionemo-framework:<tag> \
            --format '{{ index .Config.Labels "com.nvidia.bionemo.git_sha" }}'
          ```
        - **Version tag:** The part that comes after the colon (`:`) in the image name
          (see [NGC tags](https://catalog.ngc.nvidia.com/orgs/nvidia/teams/clara/containers/bionemo-framework/tags)). You can list all released tags with:
          ```bash
          git ls-remote --tags origin
          ```
      placeholder: commit hash or version tag, e.g. `v1.2.3`
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the bug
      placeholder: |
        Describe what happened and what you expected to happen.
        Include any relevant context about when/where this occurs.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior
      placeholder: |
        1. Configure environment with '...'
        2. Run command '...'
        3. Execute function '...'
        4. See error

        Code example:
        ```python
        # Minimal code that reproduces the issue
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Messages and Logs
      description: Include any relevant error messages, stack traces, or logs
      render: shell
      placeholder: |
        ```
        Paste the full error message and stack trace here
        ```
    validations:
      required: false

  - type: input
    id: docker-image-info
    attributes:
      label: Docker Image
      description: If the issue occurred in a container, provide the docker image name. Visit the [PyTorch NGC Container Registry](https://catalog.ngc.nvidia.com/orgs/nvidia/containers/pytorch) for available images.
      placeholder: e.g., nvcr.io/nvidia/pytorch:26.05-py3
    validations:
      required: false

  - type: textarea
    id: system-info
    attributes:
      label: System Information
      description: Provide details about your system environment
      value: |
        Environment Details:
        - OS: [e.g., Ubuntu 20.04]
        - CPU: [e.g., Intel i9-12900K]
        - RAM: [e.g., 64GB]

        GPU Details:
        - GPU Model: [e.g., NVIDIA RTX 4090]
        - GPU Memory: [e.g., 24GB]
        - CUDA Version: [e.g., 12.1]
        - CUDA Driver: [e.g., 525.85.05]
        - cuDNN Version: [e.g., 8.9.0]

    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: |
        - Screenshots (if applicable)
        - Links to relevant documentation
        - Attempted solutions
