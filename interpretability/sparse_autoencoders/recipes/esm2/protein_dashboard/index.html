<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAE Feature Dashboard</title>
    <style>
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: normal;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_Lt.woff2);
        font-weight: light;
      }
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: italic;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_LtIt.woff2);
        font-weight: light;
      }
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: normal;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_Rg.woff2);
        font-weight: normal;
      }
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: italic;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_It.woff2);
        font-weight: normal;
      }
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: normal;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_Bd.woff2);
        font-weight: bold;
      }
      @font-face {
        font-family: 'NVIDIA Sans';
        font-style: italic;
        src: url(https://brand-assets.cne.ngc.nvidia.com/assets/fonts/nvidia-sans/1.0.0/NVIDIASans_BdIt.woff2);
        font-weight: bold;
      }
      :root {
        --bg: #f5f5f5;
        --bg-card: #fff;
        --bg-card-expanded: #fafafa;
        --bg-example: #fff;
        --bg-input: #fff;
        --border: #e0e0e0;
        --border-light: #eee;
        --border-input: #ddd;
        --text: #333;
        --text-secondary: #666;
        --text-tertiary: #888;
        --text-muted: #999;
        --text-heading: #000;
        --accent: #76b900;
        --highlight-border: #222;
        --highlight-shadow: rgba(0,0,0,0.15);
        --link: #2563eb;
        --loading-bar-bg: #e0e0e0;
        --density-bar-bg: #e0e0e0;
        --scrollbar-thumb: #ccc;
      }
      :root.dark {
        --bg: #000;
        --bg-card: #000;
        --bg-card-expanded: #000;
        --bg-example: #0a0a0a;
        --bg-input: #0a0a0a;
        --border: #444;
        --border-light: #3a3a3a;
        --border-input: #4a4a4a;
        --text: #E0E0E0;
        --text-secondary: #bbb;
        --text-tertiary: #999;
        --text-muted: #777;
        --text-heading: #fff;
        --accent: #76b900;
        --highlight-border: #76b900;
        --highlight-shadow: rgba(118,185,0,0.3);
        --link: #76b900;
        --loading-bar-bg: #444;
        --density-bar-bg: #444;
        --scrollbar-thumb: #555;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'NVIDIA Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
