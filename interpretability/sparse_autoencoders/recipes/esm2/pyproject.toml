[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "esm2-sae"
version = "0.1.0"
description = "Sparse Autoencoders for ESM2 protein language models"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name="Jared Wilber", email="jwilber@nvidia.com" },
]
keywords = ["machine learning", "biology", "proteins", "interpretability", "esm2"]

# Depends on the generic SAE package
dependencies = [
    "sae",
    "torch>=2.0",
    "numpy>=1.20",
    "tqdm>=4.60",
    "fair-esm>=2.0",
    "biopython>=1.80",
    "transformers>=4.44,<5.0",
    "huggingface-hub>=0.25,<1.0",
    "pandas>=1.5",
    "requests>=2.25",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
]

[project.optional-dependencies]
# Data export (parquet + duckdb)
export = [
    "pyarrow>=10.0",
    "duckdb>=0.9",
    "pandas>=1.5",
]
# Full visualization pipeline
viz = [
    "umap-learn>=0.5",
    "hdbscan>=0.8",
    "pyarrow>=10.0",
    "duckdb>=0.9",
    "plotly>=5.0",
    "embedding-atlas>=0.1",
]
tracking = [
    "wandb>=0.15",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
esm2-sae-train = "esm2_sae.scripts.train:main"
esm2-sae-viz = "esm2_sae.viz.cli:main"

[tool.uv.sources]
sae = { workspace = true }
