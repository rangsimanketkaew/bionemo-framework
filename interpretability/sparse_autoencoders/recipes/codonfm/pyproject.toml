[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "codonfm-sae"
version = "0.1.0"
description = "Sparse Autoencoders for CodonFM codon language models"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name="Jared Wilber", email="jwilber@nvidia.com" },
]
keywords = ["machine learning", "biology", "codons", "dna", "interpretability"]

dependencies = [
    "sae",
    "torch>=2.0",
    "numpy>=1.20",
    "tqdm>=4.60",
    "pandas>=1.5",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "safetensors>=0.3",
    "gseapy>=1.0",
    "goatools>=1.3",
]

[project.optional-dependencies]
export = [
    "pyarrow>=10.0",
    "duckdb>=0.9",
    "pandas>=1.5",
]
viz = [
    "umap-learn>=0.5",
    "hdbscan>=0.8",
    "pyarrow>=10.0",
    "duckdb>=0.9",
]
gsea = [
    "gseapy>=1.0",
    "goatools>=1.3",
]
tracking = [
    "wandb>=0.15",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
sae = { workspace = true }
